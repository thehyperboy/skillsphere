version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: skillsphere-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: skillsphere
      MYSQL_ROOT_PASSWORD: password123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/2-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillsphere-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillsphere-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/skillsphere?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password123
    depends_on:
      database:
        condition: service_healthy
    networks:
      - skillsphere-net

volumes:
  mysql-data:

networks:
  skillsphere-net:
    driver: bridge
